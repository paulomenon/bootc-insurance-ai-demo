        - name: agentic-ai
          image: image-registry.openshift-image-registry.svc:5000/bootc-insurance-ai/agentic-ai:latest
          ports:
            - containerPort: 8002
          env:
            - name: PORT
              value: "8002"
            - name: INSURANCE_AI_AGENT_URL
              value: "http://insurance-agent:8003"
            - name: OPERATOR_AGENT_URL
              value: "http://operator-agent:8004"
            - name: LOG_LEVEL
