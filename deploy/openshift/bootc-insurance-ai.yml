---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: agentic-ai
  namespace: bootc-insurance-ai
spec:
  to:
    kind: Service
    name: agentic-ai
  port:
    targetPort: 8002
  tls:
    termination: edge
---
apiVersion: v1
kind: Secret
metadata:
  name: telegram-bot-token
  namespace: bootc-insurance-ai
type: Opaque
stringData:
  TELEGRAM_BOT_TOKEN: "your-telegram-bot-token-here"
---
apiVersion: image.openshift.io/v1
kind: ImageStream
metadata:
  name: telegram-bot
  namespace: bootc-insurance-ai
---
apiVersion: build.openshift.io/v1
kind: BuildConfig
metadata:
  name: telegram-bot
  namespace: bootc-insurance-ai
spec:
  source:
    type: Git
    git:
      uri: https://github.com/paulomenon/bootc-insurance-ai-demo.git
      ref: main
    contextDir: .
  strategy:
    type: Docker
    dockerStrategy:
      dockerfilePath: Containerfile.service
      buildArgs:
        - name: SERVICE_NAME
          value: telegram-bot
        - name: SERVICE_PORT
          value: "8005"
  output:
    to:
      kind: ImageStreamTag
      name: telegram-bot:latest
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: telegram-bot
  namespace: bootc-insurance-ai
  annotations:
    image.openshift.io/triggers: >-
      [{"from":{"kind":"ImageStreamTag","name":"telegram-bot:latest"},"fieldPath":"spec.template.spec.containers[0].image"}]
spec:
  replicas: 1
  selector:
    matchLabels:
      app: telegram-bot
  template:
    metadata:
      labels:
        app: telegram-bot
        system: bootc-insurance-ai
    spec:
      containers:
        - name: telegram-bot
          image: image-registry.openshift-image-registry.svc:5000/bootc-insurance-ai/telegram-bot:latest
          env:
            - name: TELEGRAM_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: telegram-bot-token
                  key: TELEGRAM_BOT_TOKEN
            - name: LLM_SERVICE_URL
              value: "http://dummy-llm:8001"
            - name: AGENTIC_AI_URL
              value: "http://agentic-ai:8002"
            - name: LOG_LEVEL
              value: "INFO"
