---
apiVersion: v1
kind: Namespace
metadata:
  name: bootc-insurance-ai
---
apiVersion: image.openshift.io/v1
kind: ImageStream
metadata:
  name: dummy-llm
  namespace: bootc-insurance-ai
---
apiVersion: build.openshift.io/v1
kind: BuildConfig
metadata:
  name: dummy-llm
  namespace: bootc-insurance-ai
spec:
  source:
    type: Git
    git:
      uri: https://github.com/paulomenon/bootc-insurance-ai-demo.git
      ref: main
    contextDir: .
  strategy:
    type: Docker
    dockerStrategy:
      dockerfilePath: Containerfile.service
      buildArgs:
        - name: SERVICE_NAME
          value: dummy-llm
        - name: SERVICE_PORT
          value: "8001"
  output:
    to:
      kind: ImageStreamTag
      name: dummy-llm:latest
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dummy-llm
  namespace: bootc-insurance-ai
  annotations:
    image.openshift.io/triggers: >-
      [{"from":{"kind":"ImageStreamTag","name":"dummy-llm:latest"},"fieldPath":"spec.template.spec.containers[0].image"}]
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dummy-llm
  template:
    metadata:
      labels:
        app: dummy-llm
        system: bootc-insurance-ai
    spec:
      containers:
        - name: dummy-llm
          image: image-registry.openshift-image-registry.svc:5000/bootc-insurance-ai/dummy-llm:latest
          ports:
            - containerPort: 8001
          env:
            - name: PORT
              value: "8001"
            - name: LOG_LEVEL
              value: "INFO"
          readinessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 10
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: dummy-llm
  namespace: bootc-insurance-ai
spec:
  selector:
    app: dummy-llm
  ports:
    - port: 8001
      targetPort: 8001
---
