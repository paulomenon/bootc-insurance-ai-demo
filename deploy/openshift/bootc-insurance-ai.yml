  namespace: bootc-insurance-ai
---
apiVersion: build.openshift.io/v1
kind: BuildConfig
metadata:
  name: agentic-ai
  namespace: bootc-insurance-ai
spec:
  source:
    type: Git
    git:
      uri: https://github.com/paulomenon/bootc-insurance-ai-demo.git
      ref: main
    contextDir: .
  strategy:
    type: Docker
    dockerStrategy:
      dockerfilePath: Containerfile.service
      buildArgs:
        - name: SERVICE_NAME
          value: agentic-ai
        - name: SERVICE_PORT
          value: "8002"
  output:
    to:
      kind: ImageStreamTag
      name: agentic-ai:latest
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: agentic-ai
  namespace: bootc-insurance-ai
  annotations:
    image.openshift.io/triggers: >-
      [{"from":{"kind":"ImageStreamTag","name":"agentic-ai:latest"},"fieldPath":"spec.template.spec.containers[0].image"}]
spec:
