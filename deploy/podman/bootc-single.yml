version: "3.8"

services:
  bootc-insurance-ai:
    build:
      context: ../..
      dockerfile: Containerfile
    ports:
      - "8001:8001"
      - "8002:8002"
      - "8003:8003"
      - "8004:8004"
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - LOG_LEVEL=INFO
    restart: unless-stopped
